<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:340px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace;background:#0f172a;color:#e2e8f0;padding:20px}
h1{font-size:1rem;margin-bottom:4px;background:linear-gradient(135deg,#4ade80,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;color:#64748b;margin-bottom:16px}
.pwd-box{background:#1e293b;border:2px solid #334155;border-radius:10px;padding:14px;font-size:1.2rem;text-align:center;word-break:break-all;margin-bottom:8px;min-height:48px;display:flex;align-items:center;justify-content:center;letter-spacing:2px;transition:border-color .3s}
.pwd-box.weak{border-color:#ef4444}
.pwd-box.medium{border-color:#f59e0b}
.pwd-box.strong{border-color:#4ade80}
.strength-bar{height:4px;border-radius:2px;margin-bottom:16px;transition:width .3s}
.strength-bar.weak{width:33%;background:#ef4444}
.strength-bar.medium{width:66%;background:#f59e0b}
.strength-bar.strong{width:100%;background:#4ade80}
.btn-row{display:flex;gap:8px;margin-bottom:16px}
.btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:.8rem;cursor:pointer;text-align:center}
.btn.generate{background:linear-gradient(135deg,#16a34a,#0d9488);color:#fff}
.btn.copy{background:#1e293b;border:1px solid #334155;color:#e2e8f0}
.btn:hover{opacity:.9}
.options{font-size:.75rem;color:#94a3b8}
.opt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.opt-row input[type="range"]{accent-color:#4ade80;width:120px}
.opt-row input[type="checkbox"]{accent-color:#4ade80;width:16px;height:16px}
.opt-row label{cursor:pointer}
.copied{color:#4ade80;font-size:.7rem;text-align:center;display:none;margin-top:4px}
</style>
</head>
<body>
<h1>Password Generator</h1>
<p class="sub">Strong random passwords, zero permissions</p>

<div class="pwd-box strong" id="pwdDisplay">Click Generate</div>
<div class="strength-bar strong" id="strengthBar"></div>

<div class="btn-row">
  <button class="btn generate" id="genBtn">Generate</button>
  <button class="btn copy" id="copyBtn">Copy</button>
</div>
<div class="copied" id="copied">Copied!</div>

<div class="options">
  <div class="opt-row">
    <label>Length: <span id="lenVal">16</span></label>
    <input type="range" id="length" min="8" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
  </div>
  <div class="opt-row">
    <label for="upper">A-Z Uppercase</label>
    <input type="checkbox" id="upper" checked onchange="generate()">
  </div>
  <div class="opt-row">
    <label for="lower">a-z Lowercase</label>
    <input type="checkbox" id="lower" checked onchange="generate()">
  </div>
  <div class="opt-row">
    <label for="numbers">0-9 Numbers</label>
    <input type="checkbox" id="numbers" checked onchange="generate()">
  </div>
  <div class="opt-row">
    <label for="symbols">!@#$ Symbols</label>
    <input type="checkbox" id="symbols" onchange="generate()">
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
