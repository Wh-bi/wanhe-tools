<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:360px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:1rem;margin-bottom:4px;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;color:#64748b;margin-bottom:16px}
.result{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;font-size:.8rem;line-height:1.6}
.result h3{color:#64748b;font-size:.7rem;text-transform:uppercase;margin-bottom:4px}
.result .orig{color:#94a3b8;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #1e293b}
.result .trans{color:#e2e8f0}
.empty{color:#64748b;text-align:center;padding:24px;font-size:.8rem}
</style>
</head>
<body>
<h1>AI Translator</h1>
<p class="sub">Select text on page -> right click -> Translate</p>
<div id="content">
  <div class="empty" id="empty">Select text on a webpage, right-click and choose a translation option. Result will appear here.</div>
  <div class="result" id="result" style="display:none">
    <h3>Original</h3>
    <div class="orig" id="original"></div>
    <h3>Translation</h3>
    <div class="trans" id="translation"></div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
