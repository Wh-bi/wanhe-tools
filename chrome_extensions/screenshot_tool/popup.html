<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:320px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:1rem;margin-bottom:4px;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;color:#64748b;margin-bottom:16px}
.btn{display:block;width:100%;padding:12px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.85rem;cursor:pointer;text-align:left;transition:border-color .2s}
.btn:hover{border-color:#a78bfa}
.btn .icon{font-size:1.2rem;margin-right:8px}
.btn .desc{display:block;font-size:.65rem;color:#64748b;margin-top:2px}
.shortcut{float:right;color:#64748b;font-size:.65rem;background:#0f172a;padding:2px 6px;border-radius:3px}
</style>
</head>
<body>
<h1>Screenshot Tool</h1>
<p class="sub">Capture, edit, annotate, share</p>

<button class="btn" id="visibleBtn">
  <span class="icon">Visible Area</span>
  <span class="desc">Capture what you see right now</span>
</button>

<button class="btn" id="fullPageBtn">
  <span class="icon">Full Page</span>
  <span class="desc">Entire scrollable page content</span>
</button>

<button class="btn" id="selectionBtn">
  <span class="icon">Select Area</span>
  <span class="desc">Click and drag to select region</span>
</button>

<div style="text-align:center;color:#64748b;font-size:.65rem;margin-top:8px">
  Shortcut: Ctrl+Shift+S
</div>

<script src="popup.js"></script>
</body>
</html>
