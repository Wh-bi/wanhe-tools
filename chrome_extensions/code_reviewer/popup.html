<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:400px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",monospace;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:1rem;margin-bottom:4px;background:linear-gradient(135deg,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;color:#64748b;margin-bottom:16px}
.result{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;font-size:.75rem;line-height:1.6;max-height:500px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.result .code{color:#94a3b8;background:#0f172a;padding:4px 8px;border-radius:4px;margin-bottom:8px;display:block;font-family:monospace}
.empty{color:#64748b;text-align:center;padding:24px;font-size:.8rem}
</style>
</head>
<body>
<h1>AI Code Reviewer</h1>
<p class="sub">Select code on page -> right click -> AI Code Review</p>
<div id="content">
  <div class="empty" id="empty">Select code on a webpage (GitHub/Gitee/etc), right-click and choose "AI Code Review". Result will appear here.</div>
  <div class="result" id="result" style="display:none">
    <div class="code" id="code"></div>
    <div id="body"></div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
