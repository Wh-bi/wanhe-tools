<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:280px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;padding:16px}
h1{font-size:1rem;margin-bottom:4px;background:linear-gradient(135deg,#c084fc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:.7rem;color:#64748b;margin-bottom:16px}
.btn{display:block;width:100%;padding:10px;background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;border:none;border-radius:8px;font-size:.85rem;cursor:pointer}
.btn:hover{opacity:.9}
</style>
</head>
<body>
<h1>Reader Mode</h1>
<p class="sub">Clean reading, no distractions</p>
<button class="btn" id="enableBtn">Enable Reader Mode</button>
<script src="popup.js"></script>
</body>
</html>
